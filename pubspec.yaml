name: magi_hair_off
description: "A new Flutter project."

publish_to: 'none'

# Versione incrementata per lo store
version: 1.0.1+4

environment:
  sdk: '>=3.4.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  table_calendar: ^3.0.9
  url_launcher: ^6.3.1
  intl_phone_field: ^3.2.0
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

  # 🔥 Firebase & Notifiche (Versioni allineate per evitare conflitti)
  firebase_core: ^3.3.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_messaging: ^15.1.1
  flutter_local_notifications: ^17.2.1

  # 🔊 Audio
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/img/Logooffmagi.png"

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/audio/